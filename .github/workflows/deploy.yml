name: Deploy

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PYTHON_VERSION: "3.12"
  TF_VERSION: "1.7.5"
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # Job 1: Backend tests
  # ============================================================
  test-backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - run: pip install -r requirements-dev.txt
      - run: ruff check src/
      - run: mypy src/ --ignore-missing-imports
      - run: pytest tests/ -v --tb=short

  # ============================================================
  # Job 2: Frontend tests
  # ============================================================
  test-frontend:
    name: Frontend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ============================================================
  # Job 3: Terraform validate
  # ============================================================
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ============================================================
  # Job 4: Deploy to Dev
  # ============================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, terraform-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    outputs:
      api_url: ${{ steps.tf-outputs.outputs.api_url }}
      user_pool_id: ${{ steps.tf-outputs.outputs.user_pool_id }}
      client_id: ${{ steps.tf-outputs.outputs.client_id }}
      frontend_bucket: ${{ steps.tf-outputs.outputs.frontend_bucket }}
      frontend_url: ${{ steps.tf-outputs.outputs.frontend_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}"

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_base_url)" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT
          echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ steps.tf-outputs.outputs.api_url }}
          REACT_APP_USER_POOL_ID: ${{ steps.tf-outputs.outputs.user_pool_id }}
          REACT_APP_CLIENT_ID: ${{ steps.tf-outputs.outputs.client_id }}
        run: npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ steps.tf-outputs.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/build/index.html \
            s3://${{ steps.tf-outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${local.name_prefix} frontend'].Id" \
            --output text 2>/dev/null || \
            aws cloudfront list-distributions \
            --query "DistributionList.Items[0].Id" \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id $DIST_ID \
            --paths "/*"

      - name: Print URLs
        run: |
          echo "Frontend: ${{ steps.tf-outputs.outputs.frontend_url }}"
          echo "API: ${{ steps.tf-outputs.outputs.api_url }}"

  # ============================================================
  # Job 5: Deploy to Prod
  # ============================================================
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, terraform-validate]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: prod

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="environment=prod" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}"

      - name: Capture outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "api_url=$(terraform output -raw api_base_url)" >> $GITHUB_OUTPUT
          echo "user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw cognito_client_id)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install and build frontend
        working-directory: frontend
        env:
          REACT_APP_API_URL: ${{ steps.tf-outputs.outputs.api_url }}
          REACT_APP_USER_POOL_ID: ${{ steps.tf-outputs.outputs.user_pool_id }}
          REACT_APP_CLIENT_ID: ${{ steps.tf-outputs.outputs.client_id }}
        run: npm ci && npm run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ steps.tf-outputs.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp frontend/build/index.html \
            s3://${{ steps.tf-outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
